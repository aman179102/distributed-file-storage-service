apiVersion: apps/v1
kind: Deployment
metadata:
  name: filestore
  namespace: filestore
  labels:
    app: filestore
spec:
  replicas: 3
  selector:
    matchLabels:
      app: filestore
  template:
    metadata:
      labels:
        app: filestore
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - filestore
                topologyKey: kubernetes.io/hostname
      containers:
        - name: filestore
          image: filestore:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: filestore-config
            - secretRef:
                name: filestore-secrets
          volumeMounts:
            - name: storage
              mountPath: /data/storage
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: filestore-storage
---
apiVersion: v1
kind: Service
metadata:
  name: filestore
  namespace: filestore
  labels:
    app: filestore
spec:
  type: ClusterIP
  selector:
    app: filestore
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filestore-storage
  namespace: filestore
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: filestore-hpa
  namespace: filestore
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: filestore
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
